<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROCKSTAR</title>
<meta name="description" content="ROCKSTAR — Actual General Intelligence, Inc." />
<meta property="og:title" content="ROCKSTAR" />
<meta property="og:description" content="Actual General Intelligence, Inc." />
<meta property="og:type" content="video.other" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#0a0908;          /* warm aged black */
    --void-2:#100d0b;
    --iron:#9a2b1e;          /* oxidized iron-stone red */
    --iron-dim:#6f231a;
    --ash:#cdc4b8;           /* aged paper white */
    --ash-dim:#7d756b;       /* dim catalog text */
    --hair:#231f1b;          /* hairline */
  }

  *{ box-sizing:border-box; }

  html,body{ margin:0; padding:0; background:var(--void); }

  body{
    color:var(--ash);
    font-family:"Space Mono", ui-monospace, monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ---- archival overlays ---- */
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:40;
    background:radial-gradient(120% 90% at 50% 42%, transparent 38%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode:multiply;
  }
  .grain{
    position:fixed; inset:-50%; pointer-events:none; z-index:41; opacity:.06;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  @media (prefers-reduced-motion: no-preference){
    .grain{ animation:drift .42s steps(3) infinite; }
    @keyframes drift{
      0%{ transform:translate(0,0); }
      33%{ transform:translate(-4%,2%); }
      66%{ transform:translate(3%,-3%); }
      100%{ transform:translate(-2%,1%); }
    }
  }

  /* ---- layout ---- */
  main{
    position:relative; z-index:1;
    max-width:1040px;
    margin:0 auto;
    padding:clamp(1.6rem,5vw,3.4rem) clamp(1.2rem,5vw,2.5rem) clamp(2.4rem,6vw,4rem);
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh;
  }

  .studio{
    font-size:.66rem; letter-spacing:.42em; text-transform:uppercase;
    color:var(--ash-dim); text-align:center;
    padding-left:.42em;
  }

  .hero{ text-align:center; margin-top:clamp(2.6rem,9vw,5.5rem); }

  .eyebrow{
    margin:0 0 clamp(.5rem,1.6vw,1rem);
    font-size:.6rem; letter-spacing:.5em; text-transform:uppercase;
    color:var(--ash-dim); padding-left:.5em;
  }

  .title{
    margin:0;
    font-family:"Cormorant", Georgia, serif;
    font-weight:600;
    color:var(--iron);
    font-size:clamp(3.6rem,15vw,10.5rem);
    line-height:.9;
    letter-spacing:.09em;
    padding-left:.09em;
    text-shadow:0 1px 0 #000, 0 0 26px rgba(0,0,0,.6);
  }

  /* ---- the screen: one bright object ---- */
  .screen{ width:100%; margin-top:clamp(2.6rem,8vw,5rem); }

  .frame{
    position:relative;
    border:1px solid var(--hair);
    padding:6px;
    background:#000;
    box-shadow:0 0 0 1px #000, 0 24px 80px -30px rgba(0,0,0,.9);
  }
  .ratio{ position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .ratio iframe{
    position:absolute; inset:0; width:100%; height:100%; border:0; display:block;
  }

  /* ---- cold ledger, no synopsis ---- */
  .ledger{
    width:100%; margin-top:clamp(1.4rem,4vw,2.4rem);
    border-top:1px solid var(--hair);
    padding-top:clamp(1.1rem,3vw,1.6rem);
    display:flex; flex-wrap:wrap; justify-content:space-between; gap:.6rem 2rem;
    font-size:.64rem; letter-spacing:.24em; text-transform:uppercase;
    color:var(--ash-dim);
  }
  .ledger .lot{ color:var(--ash); }
  .ledger b{ color:var(--ash); font-weight:400; }

  .cat{
    width:100%; margin-top:1.1rem;
    font-size:.62rem; letter-spacing:.22em; color:var(--ash-dim);
    text-transform:uppercase; word-break:break-word;
  }

  .foot{
    margin-top:auto; padding-top:clamp(2.4rem,7vw,4rem);
    font-size:.58rem; letter-spacing:.4em; text-transform:uppercase;
    color:var(--ash-dim); text-align:center; padding-left:.4em;
  }
  .foot a{ color:var(--iron-dim); text-decoration:none; }
  .foot a:hover,.foot a:focus{ color:var(--iron); }

  :focus-visible{ outline:1px solid var(--iron); outline-offset:3px; }

  @media (max-width:560px){
    .ledger{ flex-direction:column; gap:.5rem; }
  }
</style>
</head>
<body>
  <div class="vignette"></div>
  <div class="grain"></div>

  <main>
    <div class="studio">Actual General Intelligence,&nbsp;Inc.</div>

    <header class="hero">
      <p class="eyebrow">Every Swimmer Becomes</p>
      <h1 class="title">ROCKSTAR</h1>
    </header>

    <section class="screen">
      <div class="frame">
        <div class="ratio">
          <iframe
            src="https://www.youtube.com/embed/6PsvNKQkJgQ?rel=0&playsinline=1"
            title="ROCKSTAR"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen></iframe>
        </div>
      </div>
    </section>

    <div class="ledger">
      <span class="lot">Artifact — Short Film</span>
      <span>Run Time&nbsp;&nbsp;<b>02:27</b></span>
      <span>Archival Material</span>
    </div>

    <div class="cat">Cat. No. AGI-RS-10150512-0401220904-2018152120-II</div>

    <footer class="foot">
      <a href="https://rockstar.film">rockstar.film</a>
    </footer>
  </main>
</body>
</html>
